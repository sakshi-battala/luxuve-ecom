<nav class="aura-nav" [class.scrolled]="isScrolled">
  <div class="nav-brand" routerLink="/home">LUXUVE</div>

  <div class="nav-actions">
    <a
      routerLink="/collections"
      class="nav-link"
      (click)="$event.stopPropagation()"
      >Collections</a
    >

    <div class="divider"></div>

    <!-- Theme Toggle (Moon/Sun) -->
    <button class="icon-btn" (click)="toggleTheme()" title="Toggle Theme">
      <svg
        *ngIf="isDarkMode"
        xmlns="http://www.w3.org/2000/svg"
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <circle cx="12" cy="12" r="5" />
        <path
          d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"
        />
      </svg>
      <svg
        *ngIf="!isDarkMode"
        xmlns="http://www.w3.org/2000/svg"
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
      </svg>
    </button>

    <!-- Cart (Shopping Bag) -->
    <button class="icon-btn cart-trigger" (click)="onNavigateToCart($event)" >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z" />
        <line x1="3" y1="6" x2="21" y2="6" />
        <path d="M16 10a4 4 0 0 1-8 0" />
      </svg>
      <span class="cart-count" *ngIf="cartService.cartCount() > 0">{{
        cartService.cartCount()
      }}</span>
    </button>

    <div class="divider"></div>

    <!-- Auth Section -->
    @if (isLoggedIn) {
      <button class="logout-btn" (click)="logout(); $event.stopPropagation()">
        <span>Logout</span>
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
      </button>
    } @else {
      <a routerLink="/login" class="nav-link" (click)="$event.stopPropagation()"
        >Login</a
      >
    }
  </div>
</nav>
