<div class="auth-wrapper">
  <div class="auth-container">
    <div class="auth-visual">
      <div class="visual-content">
        <span class="badge">Collection 2026</span>
        <h2>The Art of <br />Minimalism.</h2>
        <p>Experience e-commerce in its purest form.</p>
      </div>
      <div class="visual-overlay"></div>
    </div>

    <div class="auth-form-section">
      <div class="form-header">
        <h1>Create Account</h1>
        <p>Enter your details to join.</p>
      </div>

      <form (ngSubmit)="onSignup($event)">
        <div class="input-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            placeholder="alex@example.com"
            required
            name="email"
            id="email"
            [(ngModel)]="email"
          />
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input
              [type]="showPassword() ? 'text' : 'password'"
              placeholder="••••••••"
              required
              name="password"
              id="password"
              [ngModel]="password()"
              (ngModelChange)="password.set($event)"
            />
            <button
              type="button"
              class="toggle-password"
              (click)="togglePassword()"
            >
              <svg
                *ngIf="!showPassword()"
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"
                />
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                />
              </svg>

              <svg
                *ngIf="showPassword()"
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"
                />
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-main" [disabled]="isLoading()">
          Get Started
        </button>

        <div class="divider">
          <span>OR</span>
        </div>

        <button (click)="onGoogleSignup()" type="button" class="btn-google">
          <img
            src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
            alt="Google"
          />
          Google
        </button>
      </form>

      <div class="form-footer">
        Already have an account? <a routerLink="/login">Login</a>
      </div>
    </div>
  </div>
</div>
